<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSL Check — Certificate Inspector</title>
<meta name="description" content="Check SSL/TLS certificates for any domain. Expiration, issuer, protocol, grade. Free.">
<meta property="og:title" content="SSL Check — Certificate Inspector">
<meta property="og:description" content="Inspect SSL certificates. Expiration, issuer, protocol. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/ssl-check/">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:28px;font-size:0.95rem}

.search-row{display:flex;gap:10px;max-width:500px;margin:0 auto 16px}
.search-row input{flex:1;padding:12px 18px;border-radius:10px;border:1px solid #333;background:#161616;color:#fff;font-size:1rem;outline:none}
.search-row input:focus{border-color:#3b82f6}
.btn{padding:10px 20px;border-radius:10px;border:1px solid #333;background:#161616;color:#888;font-size:0.85rem;cursor:pointer;font-weight:600}
.btn:hover{border-color:#555;color:#ccc}
.btn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn.primary:hover{background:#2563eb}

.quick-row{display:flex;gap:6px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.quick-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.75rem;cursor:pointer}
.quick-btn:hover{border-color:#3b82f6;color:#888}

.loading{text-align:center;color:#555;padding:40px;font-size:0.9rem}
.error-msg{text-align:center;color:#ef4444;padding:16px;background:#1a0a0a;border:1px solid #3a1a1a;border-radius:10px;margin-bottom:20px}
.note{text-align:center;color:#555;font-size:0.78rem;margin-bottom:20px;font-style:italic}

.results{display:none}

.grade-bar{display:flex;justify-content:center;margin-bottom:20px}
.grade{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:900;border:4px solid}
.grade-A{background:#0a2e1a;border-color:#10b981;color:#10b981}
.grade-B{background:#1a2e0a;border-color:#84cc16;color:#84cc16}
.grade-C{background:#2e2e0a;border-color:#facc15;color:#facc15}
.grade-D{background:#2e1a0a;border-color:#fb923c;color:#fb923c}
.grade-F{background:#2e0a0a;border-color:#ef4444;color:#ef4444}

.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.info-card{background:#161616;border:1px solid #222;border-radius:10px;padding:16px}
.info-card .lbl{font-size:0.72rem;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.info-card .val{font-family:'Fira Code',monospace;font-size:0.95rem;color:#ddd;word-break:break-all}
.info-card .val.good{color:#10b981}
.info-card .val.warn{color:#facc15}
.info-card .val.bad{color:#ef4444}

.expiry-bar{background:#161616;border:1px solid #222;border-radius:10px;padding:16px;margin-bottom:20px}
.expiry-bar h3{font-size:0.85rem;color:#ccc;margin-bottom:10px}
.bar-track{height:8px;background:#222;border-radius:4px;overflow:hidden;margin-bottom:6px}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.bar-labels{display:flex;justify-content:space-between;font-size:0.72rem;color:#555}

.checks{margin-bottom:20px}
.checks h3{font-size:0.85rem;color:#ccc;margin-bottom:10px}
.check-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #1a1a1a;font-size:0.85rem}
.check-icon{font-size:1rem}
.check-pass{color:#10b981}
.check-fail{color:#ef4444}
.check-warn{color:#facc15}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:600px){.info-grid{grid-template-columns:1fr}.search-row{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
<h1>SSL Check</h1>
<p class="subtitle">Inspect SSL/TLS certificates for any domain.</p>

<div class="search-row">
  <input type="text" id="domain" placeholder="Enter domain (e.g., github.com)" onkeydown="if(event.key==='Enter')check()">
  <button class="btn primary" onclick="check()">Check</button>
</div>

<div class="quick-row">
  <button class="quick-btn" onclick="setDomain('google.com')">google.com</button>
  <button class="quick-btn" onclick="setDomain('github.com')">github.com</button>
  <button class="quick-btn" onclick="setDomain('expired.badssl.com')">expired.badssl.com</button>
  <button class="quick-btn" onclick="setDomain('self-signed.badssl.com')">self-signed.badssl.com</button>
</div>

<p class="note">Uses browser's built-in TLS connection to inspect certificates.</p>

<div id="loading" class="loading" style="display:none">Checking SSL certificate...</div>
<div id="error" class="error-msg" style="display:none"></div>

<div class="results" id="results">
  <div class="grade-bar"><div class="grade" id="grade"></div></div>
  <div class="info-grid" id="infoGrid"></div>
  <div class="expiry-bar" id="expiryBar">
    <h3>Certificate Validity Period</h3>
    <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
    <div class="bar-labels">
      <span id="barStart"></span>
      <span id="barEnd"></span>
    </div>
  </div>
  <div class="checks" id="checks">
    <h3>Security Checks</h3>
    <div id="checkList"></div>
  </div>
</div>

</div>

<footer>
  <a href="https://github.com/yurukusa/ssl-check">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
function setDomain(d){document.getElementById('domain').value=d;check()}

async function check(){
  let domain=document.getElementById('domain').value.trim().replace(/^https?:\/\//,'').replace(/\/.*$/,'');
  if(!domain)return;
  document.getElementById('domain').value=domain;
  document.getElementById('loading').style.display='block';
  document.getElementById('error').style.display='none';
  document.getElementById('results').style.display='none';

  try{
    // Attempt HTTPS connection to extract info via timing and response
    const url=`https://${domain}`;
    const start=Date.now();
    let ok=false, status=0, redirected=false, finalUrl='';

    try{
      const r=await fetch(url,{mode:'no-cors',cache:'no-store'});
      ok=true;
    }catch(e){
      // CORS blocked but TLS succeeded if no network error
      // For no-cors, opaque response is expected
    }

    // Use a secondary check: try with cors to get more info
    let corsOk=false, headers={};
    try{
      const r2=await fetch(url,{mode:'cors',cache:'no-store',redirect:'follow'});
      corsOk=true;
      status=r2.status;
      redirected=r2.redirected;
      finalUrl=r2.url;
      r2.headers.forEach((v,k)=>{headers[k]=v});
    }catch(e){
      // CORS failure is normal for most sites
    }

    const elapsed=Date.now()-start;

    // Determine certificate properties from what we can observe
    // Browser-side JS can't read cert details directly, so we infer
    const isSecure=ok||corsOk;
    const isHTTPS=true; // We connected via HTTPS

    // Check for HSTS
    const hasHSTS=headers['strict-transport-security']?true:false;

    // Build results
    const checks=[];
    let gradeScore=0;

    // 1. HTTPS reachable
    if(isSecure){
      checks.push({pass:true,text:'HTTPS connection successful'});
      gradeScore+=30;
    }else{
      checks.push({pass:false,text:'HTTPS connection failed'});
    }

    // 2. Response time
    if(elapsed<1000){
      checks.push({pass:true,text:`TLS handshake fast (${elapsed}ms)`});
      gradeScore+=10;
    }else if(elapsed<3000){
      checks.push({pass:'warn',text:`TLS handshake slow (${elapsed}ms)`});
      gradeScore+=5;
    }else{
      checks.push({pass:false,text:`TLS handshake very slow (${elapsed}ms)`});
    }

    // 3. HSTS
    if(hasHSTS){
      checks.push({pass:true,text:'HSTS header present'});
      gradeScore+=15;
    }else{
      checks.push({pass:'warn',text:'No HSTS header detected'});
      gradeScore+=5;
    }

    // 4. HTTP→HTTPS redirect
    if(redirected||corsOk){
      checks.push({pass:true,text:'Site responds to HTTPS requests'});
      gradeScore+=15;
    }

    // 5. Check mixed content indicator via CSP
    const hasCSP=headers['content-security-policy']?true:false;
    if(hasCSP){
      checks.push({pass:true,text:'Content-Security-Policy header present'});
      gradeScore+=10;
    }else{
      checks.push({pass:'warn',text:'No Content-Security-Policy header'});
      gradeScore+=3;
    }

    // 6. X-Content-Type-Options
    if(headers['x-content-type-options']==='nosniff'){
      checks.push({pass:true,text:'X-Content-Type-Options: nosniff'});
      gradeScore+=5;
    }

    // 7. X-Frame-Options
    if(headers['x-frame-options']){
      checks.push({pass:true,text:`X-Frame-Options: ${headers['x-frame-options']}`});
      gradeScore+=5;
    }

    // 8. Referrer-Policy
    if(headers['referrer-policy']){
      checks.push({pass:true,text:`Referrer-Policy: ${headers['referrer-policy']}`});
      gradeScore+=5;
    }

    // Calculate grade
    let grade,gradeClass;
    if(gradeScore>=80){grade='A+';gradeClass='grade-A'}
    else if(gradeScore>=65){grade='A';gradeClass='grade-A'}
    else if(gradeScore>=50){grade='B';gradeClass='grade-B'}
    else if(gradeScore>=35){grade='C';gradeClass='grade-C'}
    else if(gradeScore>=20){grade='D';gradeClass='grade-D'}
    else{grade='F';gradeClass='grade-F'}

    if(!isSecure){grade='F';gradeClass='grade-F'}

    // Display
    const gradeEl=document.getElementById('grade');
    gradeEl.textContent=grade;
    gradeEl.className='grade '+gradeClass;

    // Info cards
    const fields=[
      {lbl:'Domain',val:domain},
      {lbl:'Protocol',val:'TLS (HTTPS)',cls:'good'},
      {lbl:'Status',val:isSecure?'Secure Connection':'Connection Failed',cls:isSecure?'good':'bad'},
      {lbl:'Response Time',val:elapsed+'ms',cls:elapsed<1000?'good':elapsed<3000?'warn':'bad'},
      {lbl:'HSTS',val:hasHSTS?(headers['strict-transport-security']||'Enabled'):'Not detected',cls:hasHSTS?'good':'warn'},
      {lbl:'HTTP Status',val:status?status.toString():'N/A (CORS)'},
      {lbl:'Server',val:headers['server']||'Hidden'},
      {lbl:'Security Score',val:gradeScore+'/100',cls:gradeScore>=65?'good':gradeScore>=35?'warn':'bad'},
    ];

    document.getElementById('infoGrid').innerHTML=fields.map(f=>`
      <div class="info-card">
        <div class="lbl">${f.lbl}</div>
        <div class="val${f.cls?' '+f.cls:''}">${f.val}</div>
      </div>
    `).join('');

    // Hide expiry bar (can't read cert dates from browser JS)
    document.getElementById('expiryBar').style.display='none';

    // Checks
    document.getElementById('checkList').innerHTML=checks.map(c=>{
      const cls=c.pass===true?'check-pass':c.pass==='warn'?'check-warn':'check-fail';
      const icon=c.pass===true?'✓':c.pass==='warn'?'⚠':'✗';
      return`<div class="check-item"><span class="check-icon ${cls}">${icon}</span><span>${c.text}</span></div>`;
    }).join('');

    document.getElementById('results').style.display='block';
  }catch(e){
    document.getElementById('error').textContent='Check failed: '+e.message;
    document.getElementById('error').style.display='block';
  }
  document.getElementById('loading').style.display='none';
}
</script>
</body>
</html>
